# ==============================================================
# ZenC Ecosystem – Docker Compose (Development & Testing)
#
# Cách dùng:
#   Chạy tất cả:     docker compose -f docker-compose.dev.yml up
#   Chỉ chạy BE:     docker compose -f docker-compose.dev.yml up gateway-server
#   Chỉ chạy FE:     docker compose -f docker-compose.dev.yml up web-user
#   Chỉ chạy AI:     docker compose -f docker-compose.dev.yml up ai-worker
#
#   Test BE:          docker compose -f docker-compose.dev.yml run --rm gateway-test
#   Test FE user:     docker compose -f docker-compose.dev.yml run --rm web-user-test
#   Test FE admin:    docker compose -f docker-compose.dev.yml run --rm web-admin-test
#   Test AI:          docker compose -f docker-compose.dev.yml run --rm ai-worker-test
#   Test tất cả:      docker compose -f docker-compose.dev.yml run --rm gateway-test && docker compose -f docker-compose.dev.yml run --rm web-user-test && docker compose -f docker-compose.dev.yml run --rm web-admin-test && docker compose -f docker-compose.dev.yml run --rm ai-worker-test
# ==============================================================

services:
  # ─── Infrastructure ──────────────────────────────────────────
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${PG_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-ZenC@Str0ng!Pass2026}"
      POSTGRES_DB: "${PG_DATABASE:-zenc_ai}"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-zenc_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:6-jammy
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:-ZenC@Str0ng!Pass2026}"
      MONGO_INITDB_DATABASE: "${MONGO_DATABASE:-zenc_ai_docs}"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-init:
    image: mongo:6-jammy
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      bash -c "
      sleep 2;
      mongosh mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-ZenC@Str0ng!Pass2026}@mongodb:27017/?authSource=admin --eval '
      try {
        rs.status();
      } catch (err) {
        rs.initiate({
          _id: \"rs0\",
          members: [{ _id: 0, host: \"mongodb:27017\" }]
        });
      }
      '
      "

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-dev-qdrant-key}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H \"api-key: $$QDRANT__SERVICE__API_KEY\" http://localhost:6333/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend: Gateway Server (NestJS) – DEV ──────────────────
  gateway-server:
    build:
      context: ./apps/gateway-server
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/gateway-server/src:/app/src
      - ./apps/gateway-server/nest-cli.json:/app/nest-cli.json
    environment:
      - NODE_ENV=development
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-ZenC@Str0ng!Pass2026}
      - PG_DATABASE=${PG_DATABASE:-zenc_ai}
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-ZenC@Str0ng!Pass2026}@mongodb:27017/${MONGO_DATABASE:-zenc_ai_docs}?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-dev-admin-secret}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_PROVIDER_PRIMARY=${AI_PROVIDER_PRIMARY:-gemini}
      - AI_WORKER_BASE_URL=http://ai-worker:8000
      - AI_WORKER_TIMEOUT_MS=10000
      - AI_PROVIDER_CONNECT_TIMEOUT_MS=10000
      - CORS_ALLOWED_ORIGINS=http://localhost:3001,http://localhost:3002
      - VOICE_ALLOWED_ORIGINS=http://localhost:3001,http://localhost:3002
      - DB_POOL_MIN=5
      - DB_POOL_MAX=50
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run start:dev

  # ─── Backend: Gateway Server – TEST ───────────────────────────
  gateway-test:
    build:
      context: ./apps/gateway-server
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/gateway-server/src:/app/src
    environment:
      - NODE_ENV=test
    command: npm test
    profiles: [test]

  # ─── Frontend: Web User (Next.js) – DEV ──────────────────────
  web-user:
    build:
      context: ./apps/web-user
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - ./apps/web-user/src:/app/src
      - ./apps/web-user/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_WS_URL=
      - WATCHPACK_POLLING=true
    depends_on:
      - gateway-server
    command: npm run dev

  # ─── Frontend: Web User – TEST ───────────────────────────────
  web-user-test:
    build:
      context: ./apps/web-user
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web-user/src:/app/src
    environment:
      - NODE_ENV=test
    command: npm test
    profiles: [test]

  # ─── Frontend: Web Admin (Next.js) – DEV ─────────────────────
  web-admin:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3000"
    volumes:
      - ./apps/web-admin/src:/app/src
      - ./apps/web-admin/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=
      - WATCHPACK_POLLING=true
    depends_on:
      - gateway-server
    command: npm run dev

  # ─── Frontend: Web Admin – TEST ──────────────────────────────
  web-admin-test:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web-admin/src:/app/src
    environment:
      - NODE_ENV=test
    command: npm test
    profiles: [test]

  # ─── AI Worker (Python/FastAPI) – DEV ────────────────────────
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai-worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-dev-admin-secret}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-zenc_curriculum}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-dev-qdrant-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-ZenC@Str0ng!Pass2026}
      - PG_DATABASE=${PG_DATABASE:-zenc_ai}
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-ZenC@Str0ng!Pass2026}@mongodb:27017/${MONGO_DATABASE:-zenc_ai_docs}?authSource=admin
      - AI_PROVIDER_TIMEOUT_SECONDS=10
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=20
      - DB_POOL_TIMEOUT=30
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── AI Worker – TEST ────────────────────────────────────────
  ai-worker-test:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/ai-worker:/app
    environment:
      - NODE_ENV=test
    command: python -m pytest tests/ -v
    profiles: [test]

volumes:
  pg_data:
  mongo_data:
  qdrant_storage:
