# ==============================================================
# ZenC Ecosystem – Docker Compose (Development & Testing)
#
# Cách dùng:
#   Chạy tất cả:     docker compose -f docker-compose.dev.yml up
#   Chỉ chạy BE:     docker compose -f docker-compose.dev.yml up gateway-server
#   Chỉ chạy FE:     docker compose -f docker-compose.dev.yml up web-user
#   Chỉ chạy AI:     docker compose -f docker-compose.dev.yml up ai-worker
#
#   Test BE:          docker compose -f docker-compose.dev.yml run --rm gateway-test
#   Test FE user:     docker compose -f docker-compose.dev.yml run --rm web-user-test
#   Test FE admin:    docker compose -f docker-compose.dev.yml run --rm web-admin-test
#   Test AI:          docker compose -f docker-compose.dev.yml run --rm ai-worker-test
#   Test tất cả:      docker compose -f docker-compose.dev.yml run --rm gateway-test && docker compose -f docker-compose.dev.yml run --rm web-user-test && docker compose -f docker-compose.dev.yml run --rm web-admin-test && docker compose -f docker-compose.dev.yml run --rm ai-worker-test
# ==============================================================

services:
  # ─── Infrastructure ──────────────────────────────────────────
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${MSSQL_SA_PASSWORD:-ZenC@Str0ng!Pass2026}"
      ACCEPT_EULA: "Y"
      MSSQL_DB: "${MSSQL_DATABASE:-zenc_ai}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend: Gateway Server (NestJS) – DEV ──────────────────
  gateway-server:
    build:
      context: ./apps/gateway-server
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/gateway-server/src:/app/src
      - ./apps/gateway-server/nest-cli.json:/app/nest-cli.json
    environment:
      - NODE_ENV=development
      - MSSQL_HOST=sql-server
      - MSSQL_PORT=1433
      - MSSQL_DATABASE=${MSSQL_DATABASE:-zenc_ai}
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-ZenC@Str0ng!Pass2026}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_PROVIDER_PRIMARY=${AI_PROVIDER_PRIMARY:-gemini}
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm run start:dev

  # ─── Backend: Gateway Server – TEST ───────────────────────────
  gateway-test:
    build:
      context: ./apps/gateway-server
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/gateway-server/src:/app/src
    environment:
      - NODE_ENV=test
    command: npm test
    profiles: [test]

  # ─── Frontend: Web User (Next.js) – DEV ──────────────────────
  web-user:
    build:
      context: ./apps/web-user
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - ./apps/web-user/src:/app/src
      - ./apps/web-user/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway-server:3000
      - WATCHPACK_POLLING=true
    depends_on:
      - gateway-server
    command: npm run dev

  # ─── Frontend: Web User – TEST ───────────────────────────────
  web-user-test:
    build:
      context: ./apps/web-user
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web-user/src:/app/src
    environment:
      - NODE_ENV=test
    command: npm test
    profiles: [test]

  # ─── Frontend: Web Admin (Next.js) – DEV ─────────────────────
  web-admin:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3000"
    volumes:
      - ./apps/web-admin/src:/app/src
      - ./apps/web-admin/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway-server:3000
      - WATCHPACK_POLLING=true
    depends_on:
      - gateway-server
    command: npm run dev

  # ─── Frontend: Web Admin – TEST ──────────────────────────────
  web-admin-test:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web-admin/src:/app/src
    environment:
      - NODE_ENV=test
    command: npm test
    profiles: [test]

  # ─── AI Worker (Python/FastAPI) – DEV ────────────────────────
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai-worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-zenc_curriculum}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
      - MSSQL_HOST=sql-server
      - MSSQL_PORT=1433
      - MSSQL_DATABASE=${MSSQL_DATABASE:-zenc_ai}
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-ZenC@Str0ng!Pass2026}
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
      sql-server:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── AI Worker – TEST ────────────────────────────────────────
  ai-worker-test:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/ai-worker:/app
    environment:
      - NODE_ENV=test
    command: python -m pytest tests/ -v
    profiles: [test]

volumes:
  mssql_data:
  qdrant_storage:
