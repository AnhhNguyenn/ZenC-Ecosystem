# ==============================================================
# ZenC Ecosystem – Docker Compose (Production)
#
# Cách dùng:
#   docker compose up -d                  → Run all services
#   docker compose up -d gateway-server   → Run a specific service
#   docker compose logs -f gateway-server → Tail logs
#
# Prerequisites: copy .env.production to .env before running.
# ==============================================================

services:

  # ─── Infrastructure ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
      POSTGRES_DB: "${PG_DATABASE:-zenc_ai}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY?QDRANT_API_KEY must be set}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H \"api-key: $$QDRANT__SERVICE__API_KEY\" http://localhost:6333/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend: Gateway Server (NestJS) ────────────────────────
  gateway-server:
    build:
      context: ./apps/gateway-server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DATABASE=${PG_DATABASE:-zenc_ai}
      - PG_PASSWORD=${PG_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-15m}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-7d}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_WS_URL=${GEMINI_WS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-}
      - OPENAI_REALTIME_WS_URL=${OPENAI_REALTIME_WS_URL:-}
      - AI_PROVIDER_PRIMARY=${AI_PROVIDER_PRIMARY:-gemini}
      - AI_PROVIDER_FALLBACK=${AI_PROVIDER_FALLBACK:-openai}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-12}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - TOKEN_WATCHDOG_THRESHOLD=${TOKEN_WATCHDOG_THRESHOLD:-500}
      - AI_WORKER_BASE_URL=${AI_WORKER_BASE_URL:-http://ai-worker:8000}
      - AI_WORKER_TIMEOUT_MS=${AI_WORKER_TIMEOUT_MS:-10000}
      - AI_PROVIDER_CONNECT_TIMEOUT_MS=${AI_PROVIDER_CONNECT_TIMEOUT_MS:-10000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://zenc.ai,https://admin.zenc.ai}
      - VOICE_ALLOWED_ORIGINS=${VOICE_ALLOWED_ORIGINS:-https://zenc.ai,https://admin.zenc.ai}
      - DB_POOL_MAX=${DB_POOL_MAX:-50}
      - GATEWAY_PORT=3000
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Backend: AI Worker (Python/FastAPI) ─────────────────────
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-zenc_curriculum}
      - QDRANT_API_KEY=${QDRANT_API_KEY?QDRANT_API_KEY must be set}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_DATABASE=${PG_DATABASE:-zenc_ai}
      - PG_PASSWORD=${PG_PASSWORD}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://zenc.ai,https://admin.zenc.ai}
      - AI_PROVIDER_TIMEOUT_SECONDS=${AI_PROVIDER_TIMEOUT_SECONDS:-10}
      - DB_POOL_SIZE=${WORKER_DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${WORKER_DB_MAX_OVERFLOW:-20}
      - DB_POOL_TIMEOUT=${WORKER_DB_POOL_TIMEOUT:-30}
      - WORKER_PORT=8000
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Frontend: Web User (Next.js) ────────────────────────────
  web-user:
    build:
      context: ./apps/web-user
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - gateway-server

  # ─── Frontend: Web Admin (Next.js) ───────────────────────────
  web-admin:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: always
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - gateway-server
      - ai-worker

volumes:
  redis_data:
  pg_data:
  qdrant_storage:
  rabbitmq_data:
