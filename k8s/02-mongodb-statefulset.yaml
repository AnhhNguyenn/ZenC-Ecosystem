apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: zenc-production
  labels:
    app: mongodb
spec:
  serviceName: "mongodb"
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6-jammy
        command:
        - mongod
        - "--replSet"
        - rs0
        - "--bind_ip_all"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                if [ "${HOSTNAME}" = "mongodb-0" ]; then
                  until mongosh --eval "print(\"waited for connection\")"; do sleep 2; done
                  mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb-0.mongodb.zenc-production.svc.cluster.local:27017'}, {_id: 1, host: 'mongodb-1.mongodb.zenc-production.svc.cluster.local:27017'}, {_id: 2, host: 'mongodb-2.mongodb.zenc-production.svc.cluster.local:27017'}]})"
                fi
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: zenc-secrets
              key: MONGO_USER
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zenc-secrets
              key: MONGO_PASSWORD
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: zenc-secrets
              key: MONGO_DATABASE
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: zenc-production
spec:
  ports:
  - port: 27017
    targetPort: 27017
  selector:
    app: mongodb
