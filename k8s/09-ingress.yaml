apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zenc-ingress
  namespace: zenc-production
  annotations:
    kubernetes.io/ingress.class: nginx
    # Circuit Breaker & Timeout Configuration
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
    # Rate Limiting Configuration (L7)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    # Limit max number of simultaneous connections for a single IP (particularly WebSockets)
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Session Affinity (Sticky Sessions for WebSockets)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "zenc_route"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
spec:
  tls:
  - hosts:
    - api.zenc.ai
    secretName: zenc-tls-secret
  rules:
  - host: api.zenc.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zenc-api-service
            port:
              number: 80
